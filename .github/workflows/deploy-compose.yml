name: Deploy docker-compose to NAS

on:
  push:
    branches: [main]
    paths:
      - docker-compose.yml
      - .env.example
      - dnsmasq/**
      - mosquitto/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NAS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Sync docker-compose.yml and restart stack
        env:
          NAS_PASS: ${{ secrets.NAS_SSH_PASSWORD }}
          CF_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          # Copy updated docker-compose.yml to NAS
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            -o "ProxyCommand=cloudflared access ssh --hostname nas-ssh.aldarondo.family --id $CF_CLIENT_ID --secret $CF_CLIENT_SECRET" \
            docker-compose.yml \
            charles@nas-ssh.aldarondo.family:/volume1/docker/claude-juicebox/docker-compose.yml

          # Restart stack with updated config
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            -o "ProxyCommand=cloudflared access ssh --hostname nas-ssh.aldarondo.family --id $CF_CLIENT_ID --secret $CF_CLIENT_SECRET" \
            charles@nas-ssh.aldarondo.family \
            "echo \"$NAS_PASS\" | sudo -S sh -c '/usr/local/bin/docker compose -f /volume1/docker/claude-juicebox/docker-compose.yml stop 2>/dev/null; /usr/local/bin/docker compose -f /volume1/docker/claude-juicebox/docker-compose.yml rm -f 2>/dev/null; /usr/local/bin/docker network ls -q --filter name=claude-juicebox | xargs -r /usr/local/bin/docker network rm 2>/dev/null; /usr/local/bin/docker compose -f /volume1/docker/claude-juicebox/docker-compose.yml up -d'"
