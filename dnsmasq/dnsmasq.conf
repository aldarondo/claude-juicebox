# ─── JuiceBox DNS Override ──────────────────────────────────────────────────
#
# This dnsmasq instance is the DNS server for the JuiceBox charger only.
# The charger is configured with a static network config that points
# its DNS to this NAS (192.168.0.64). Nothing else on the network is
# affected — the Cox router and all other devices use their own DNS.
#
# Why this exists:
#   The JuiceBox uses Enel X's cloud (device-backend-udp-evos.juice.net:8042)
#   as its UDPC (UDP Client) endpoint. By resolving that hostname to our NAS,
#   we intercept the UDP data stream without needing to modify the charger's
#   UDPC setting on every reboot.
#
# The NAS itself (and all Docker containers) use their own upstream DNS
# (the Cox gateway), so JuicePassProxy's forward path to the real Enel X
#  server is unaffected.

# ─── Upstream DNS ───────────────────────────────────────────────────────────
server=8.8.8.8
server=8.8.4.4

# ─── Local overrides ────────────────────────────────────────────────────────
# Redirect the Enel X UDP server hostname to this NAS so that JuicePassProxy
# intercepts charger telemetry instead of it going straight to the cloud.
# NOTE: 192.168.0.64 is the NAS LAN IP — must match LOCAL_IP in .env.
address=/device-backend-udp-evos.juice.net/192.168.0.64

# Redirect Nirvana heat pump cloud to local proxy on NAS (Phase 2A)
# REST API (used by mobile app and periodic device calls)
address=/nirvana.iot-endpoint.com/192.168.0.64
# WebSocket endpoint (primary pump→cloud connection)
address=/ws-edge.nirvanahp.com/192.168.0.64

# ─── DHCP for JuiceBox only ──────────────────────────────────────────────────
#
# dnsmasq handles DHCP exclusively for the JuiceBox charger.
# All other devices continue to get DHCP from the Cox router.
#
# IMPORTANT — two MACs:
#   Hardware / ZentriOS MAC : 4C:55:CC:14:50:E8  (seen in telnet `get network.mac`)
#   Wi-Fi / DHCP MAC        : 52:D4:F7:14:50:E8  ← this is what the charger sends in DHCP
#   dhcp-host MUST use the Wi-Fi MAC (52:...) or dnsmasq will never match the request.
#
# Prerequisites:
#   1. Cox DHCP range changed to .5–.253 — removes .4 from Cox's pool (JuiceBox has a Cox static reservation at .4).
#      juicebox-dns container must run with network_mode: host (see docker-compose.yml)
#      so it can receive DHCP broadcasts (255.255.255.255:67).
#
# How IP assignment works:
#   JuiceBox has a Cox static DHCP reservation at .4 — Cox always offers .4.
#   dnsmasq also has a dhcp-host pinning .4 for this MAC.
#   The critical part is the DNS option (dhcp-option=6): whichever server the
#   charger accepts a lease from must hand it 192.168.0.64 as its DNS server.
#   dnsmasq wins the DNS battle by being authoritative and also offering .4.
#
# Verify: sudo docker logs juicebox-dns 2>&1 | grep -i dhcp
# Expected: DHCPACK(eth0) 192.168.0.4 52:d4:f7:14:50:e8 JuiceBox-0E8

dhcp-range=192.168.0.2,192.168.0.4,12h
dhcp-host=4c:55:cc:14:50:e8,52:d4:f7:14:50:e8,JuiceBox-0E8,192.168.0.4,12h
#
# Nirvana heat pump — WiFi MAC 52:d4:f7:98:06:0a (locally-administered; last 3 octets match label FC:0F:E7:98:06:0A)
# Assigned .3; DNS will resolve nirvana.iot-endpoint.com to NAS so pump talks to local proxy.
# Prerequisites: Cox DHCP range changed to .4–.122 so it cannot offer .2 or .3.
dhcp-host=52:d4:f7:98:06:0a,Nirvana-06A,192.168.0.3,12h
dhcp-option=3,192.168.0.1     # default gateway
dhcp-option=6,192.168.0.64    # DNS server → our dnsmasq (must match LOCAL_IP in .env)
dhcp-authoritative            # respond immediately, don't defer to other servers
dhcp-ignore=tag:!known        # silently ignore DHCP requests from unknown MACs

# ─── Housekeeping ────────────────────────────────────────────────────────────
no-hosts          # ignore /etc/hosts inside the container
no-resolv         # ignore /etc/resolv.conf inside the container (use server= above)
log-queries       # log DNS queries — useful for debugging charger DNS activity
log-dhcp          # log DHCP transactions — useful for verifying JuiceBox gets correct lease
