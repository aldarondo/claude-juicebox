name: Build JuicePassProxy custom image

on:
  push:
    branches: [main]
    paths:
      - juicepassproxy/Dockerfile
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./juicepassproxy
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/claude-juicebox-juicepassproxy:latest
            ghcr.io/${{ github.repository_owner }}/claude-juicebox-juicepassproxy:${{ github.sha }}

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NAS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy to NAS
        env:
          NAS_PASS: ${{ secrets.NAS_SSH_PASSWORD }}
          CF_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          for i in 1 2 3; do
            ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
              -o "ProxyCommand=cloudflared access ssh --hostname nas-ssh.aldarondo.family --id $CF_CLIENT_ID --secret $CF_CLIENT_SECRET" \
              charles@nas-ssh.aldarondo.family \
              "echo \"$NAS_PASS\" | sudo -S sh -c '/usr/local/bin/docker compose -f /volume1/docker/claude-juicebox/docker-compose.yml stop 2>/dev/null; /usr/local/bin/docker compose -f /volume1/docker/claude-juicebox/docker-compose.yml rm -f 2>/dev/null; /usr/local/bin/docker network ls -q --filter name=claude-juicebox | xargs -r /usr/local/bin/docker network rm 2>/dev/null; /usr/local/bin/docker compose -f /volume1/docker/claude-juicebox/docker-compose.yml pull && /usr/local/bin/docker compose -f /volume1/docker/claude-juicebox/docker-compose.yml up -d'" \
              && break || { echo "SSH attempt $i failed, retrying in 10s..."; sleep 10; }
          done
