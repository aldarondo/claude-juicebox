name: Build juicebox-mcp image

on:
  push:
    branches: [main]
    paths:
      - mcp-server/**
  schedule:
    # Rebuild weekly (Sunday 03:00 UTC) to pick up Node base image security patches
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/claude-juicebox-mcp:latest
            ghcr.io/${{ github.repository_owner }}/claude-juicebox-mcp:${{ github.sha }}

      - name: Deploy to NAS
        uses: appleboy/ssh-action@v1
        with:
          host: 192.168.0.64
          port: 2222
          username: charles
          password: ${{ secrets.NAS_SSH_PASSWORD }}
          script_stop: true
          envs: NAS_PASS
          script: |
            echo "$NAS_PASS" | sudo -S /usr/local/bin/docker compose -f /volume1/docker/claude-juicebox/docker-compose.yml pull
            echo "$NAS_PASS" | sudo -S /usr/local/bin/docker compose -f /volume1/docker/claude-juicebox/docker-compose.yml up -d
        env:
          NAS_PASS: ${{ secrets.NAS_SSH_PASSWORD }}
