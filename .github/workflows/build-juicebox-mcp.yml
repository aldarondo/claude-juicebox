name: Build juicebox-mcp image

on:
  push:
    branches: [main]
    paths:
      - mcp-server/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/claude-juicebox-mcp:latest
            ghcr.io/${{ github.repository_owner }}/claude-juicebox-mcp:${{ github.sha }}
