name: Deploy docker-compose to NAS

on:
  push:
    branches: [main]
    paths:
      - docker-compose.yml
      - .env.example
      - dnsmasq/**
      - mosquitto/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Set up SSH key and known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NAS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.NAS_SSH_KNOWN_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync docker-compose.yml and restart stack
        env:
          CF_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          # Requires one-time NAS setup — see docs/nas-deploy-key-setup.md
          NAS=charles@nas-ssh.aldarondo.family
          SSH="ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            -o ProxyCommand='cloudflared access ssh --hostname nas-ssh.aldarondo.family --id $CF_CLIENT_ID --secret $CF_CLIENT_SECRET'"

          ssh_run() { eval "$SSH $NAS \"$1\""; }
          ssh_pipe() { eval "$SSH $NAS '$1'"; }

          retry() {
            local label=$1; shift
            for i in 1 2 3; do
              "$@" && return 0 || { echo "$label attempt $i failed, retrying in 10s..."; sleep 10; }
            done
            echo "$label failed after 3 attempts" >&2; return 1
          }

          copy_compose()   { ssh_pipe 'cat > /volume1/docker/claude-juicebox/docker-compose.yml' < docker-compose.yml; }
          copy_template()  { ssh_pipe 'cat > /volume1/docker/claude-juicebox/dnsmasq/dnsmasq.conf.template' < dnsmasq/dnsmasq.conf.template; }
          restart_stack()  { ssh_run "cd /volume1/docker/claude-juicebox && \
              sudo /usr/local/bin/docker compose stop 2>/dev/null; \
              sudo /usr/local/bin/docker compose rm -f 2>/dev/null; \
              sudo /usr/local/bin/docker network ls -q --filter name=claude-juicebox | xargs -r sudo /usr/local/bin/docker network rm 2>/dev/null; \
              sudo /usr/local/bin/docker compose pull && sudo /usr/local/bin/docker compose up -d"; }

          # Copy updated docker-compose.yml to NAS
          retry "copy docker-compose.yml" copy_compose

          # Copy dnsmasq template (container reads this at start via sed substitution)
          retry "copy dnsmasq.conf.template" copy_template

          # Restart stack with updated config
          retry "restart stack" restart_stack
