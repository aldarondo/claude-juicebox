persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Plain MQTT on 1883 — local network only.
#
# Authentication (optional but recommended):
#   1. Create a password file:
#        docker exec juicebox-mosquitto mosquitto_passwd -c /mosquitto/config/passwd <username>
#   2. Uncomment the three lines below and comment out "allow_anonymous true"
#   3. Restart the container: docker restart juicebox-mosquitto
#   4. Set MQTT_USER and MQTT_PASS in .env to the same credentials
listener 1883
allow_anonymous true
#password_file /mosquitto/config/passwd
#allow_anonymous false

# WebSockets on 9001 — useful for debugging with MQTT Explorer
listener 9001
protocol websockets
allow_anonymous true
#password_file /mosquitto/config/passwd
#allow_anonymous false
