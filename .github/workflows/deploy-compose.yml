name: Deploy docker-compose to NAS

on:
  push:
    branches: [main]
    paths:
      - docker-compose.yml
      - .env.example
      - dnsmasq/**
      - mosquitto/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Set up SSH key and known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NAS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.NAS_SSH_KNOWN_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync docker-compose.yml and restart stack
        env:
          CF_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          # Requires one-time NAS setup — see docs/nas-deploy-key-setup.md
          SSH_CMD="ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes \
            -o \"ProxyCommand=cloudflared access ssh --hostname nas-ssh.aldarondo.family --id $CF_CLIENT_ID --secret $CF_CLIENT_SECRET\""

          # Copy updated docker-compose.yml to NAS (avoid SFTP subsystem, use stdin pipe)
          for i in 1 2 3; do
            eval "$SSH_CMD charles@nas-ssh.aldarondo.family 'cat > /volume1/docker/claude-juicebox/docker-compose.yml'" < docker-compose.yml \
              && break || { echo "SSH attempt $i failed, retrying in 10s..."; sleep 10; }
          done

          # Copy dnsmasq config (volume-mounted; must be synced separately from image)
          for i in 1 2 3; do
            eval "$SSH_CMD charles@nas-ssh.aldarondo.family 'cat > /volume1/docker/claude-juicebox/dnsmasq/dnsmasq.conf'" < dnsmasq/dnsmasq.conf \
              && break || { echo "SSH attempt $i failed, retrying in 10s..."; sleep 10; }
          done

          # Restart stack with updated config
          for i in 1 2 3; do
            eval "$SSH_CMD charles@nas-ssh.aldarondo.family \
              \"sudo /usr/local/bin/docker compose -f /volume1/docker/claude-juicebox/docker-compose.yml stop 2>/dev/null; sudo /usr/local/bin/docker compose -f /volume1/docker/claude-juicebox/docker-compose.yml rm -f 2>/dev/null; sudo /usr/local/bin/docker network ls -q --filter name=claude-juicebox | xargs -r sudo /usr/local/bin/docker network rm 2>/dev/null; sudo /usr/local/bin/docker compose -f /volume1/docker/claude-juicebox/docker-compose.yml pull && sudo /usr/local/bin/docker compose -f /volume1/docker/claude-juicebox/docker-compose.yml up -d\"" \
              && break || { echo "SSH attempt $i failed, retrying in 10s..."; sleep 10; }
          done
