version: "3.8"

services:

  juicebox-dns:
    image: andyshinn/dnsmasq:latest
    container_name: juicebox-dns
    cap_add:
      - NET_ADMIN
    # Host network mode required for two reasons:
    #   1. DNS: JuiceBox sends queries to LOCAL_IP:53 — host mode binds port 53 directly
    #   2. DHCP: JuiceBox broadcasts DHCP to 255.255.255.255:67 — only reachable in host mode
    #      (Docker port-mapping does not forward broadcast packets)
    network_mode: host
    volumes:
      - ./dnsmasq/dnsmasq.conf.template:/tmp/dnsmasq.conf.template:ro
    environment:
      - LOCAL_IP=${LOCAL_IP:-192.168.0.64}
      - JUICEBOX_IP=${JUICEBOX_IP:-192.168.0.4}
      - NIRVANA_IP=${NIRVANA_IP:-192.168.0.3}
      - GATEWAY_IP=${GATEWAY_IP:-192.168.0.1}
    # sed substitutes @@VAR@@ placeholders before handing config to dnsmasq
    entrypoint:
      - sh
      - -c
      - 'sed -e "s/@@LOCAL_IP@@/$$LOCAL_IP/g" -e "s/@@JUICEBOX_IP@@/$$JUICEBOX_IP/g" -e "s/@@NIRVANA_IP@@/$$NIRVANA_IP/g" -e "s/@@GATEWAY_IP@@/$$GATEWAY_IP/g" /tmp/dnsmasq.conf.template > /etc/dnsmasq.conf && exec dnsmasq -k --no-daemon -C /etc/dnsmasq.conf'
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  juicebox-mosquitto:
    image: eclipse-mosquitto:2.0.21
    container_name: juicebox-mosquitto
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"   # WebSockets — useful for debugging via MQTT Explorer
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-p", "1883", "-t", "$$SYS/broker/clients/connected", "-C", "1", "--quiet"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  juicepassproxy:
    image: ghcr.io/aldarondo/claude-juicebox-juicepassproxy:${JPP_IMAGE_TAG:-latest}   # built by .github/workflows/build-juicepassproxy.yml
    container_name: juicepassproxy
    # Host network required so it can receive UDP from the JuiceBox at 192.168.0.141
    # and so it can reach Mosquitto on localhost:1883
    network_mode: host
    volumes:
      - juicepassproxy-config:/config   # persist auto-generated juicepassproxy.yaml
    environment:
      - JUICEBOX_HOST=${JUICEBOX_HOST}
      - LOCAL_IP=${LOCAL_IP:-192.168.0.64}   # NAS LAN IP — prevents VPN/tun0 from being picked up
      - LOCAL_PORT=${LOCAL_PORT:-8042}       # Enel X UDP port; MITM binds here so DNS override routes charger traffic to us
      - UPDATE_UDPC=${UPDATE_UDPC:-false}
      - MQTT_HOST=localhost
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-}
      - MQTT_PASS=${MQTT_PASS:-}
      - ENELX_SERVER_HOST=${ENELX_SERVER_HOST:-device-backend-udp-evos.juice.net}  # actual Enel X UDP hostname for this charger
      - ENELX_SERVER_PORT=${ENELX_SERVER_PORT:-8042}   # actual Enel X UDP port
      # Cloud is shut down — ignore Enel X so JPP actually sends UDP commands to the JuiceBox.
      # Without this, send_cmd_message_to_juicebox() logs a warning and is a no-op.
      - IGNORE_ENELX=${IGNORE_ENELX:-true}
      - MITM_RECV_TIMEOUT=${MITM_RECV_TIMEOUT:-600}    # upstream default 120s causes restarts every ~3.3 hrs at idle; 600s = ~10 min
    restart: unless-stopped
    healthcheck:
      # JPP exposes a telnet debug port on 2000 when running; nc checks it's listening.
      test: ["CMD", "sh", "-c", "nc -z localhost 2000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      - juicebox-mosquitto

  juicebox-mcp:
    image: ghcr.io/aldarondo/claude-juicebox-mcp:${MCP_IMAGE_TAG:-latest}
    container_name: juicebox-mcp
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    environment:
      - PORT=${PORT:-3001}
      - MQTT_BROKER=mqtt://juicebox-mosquitto:1883
      - MQTT_USER=${MQTT_USER:-}
      - MQTT_PASS=${MQTT_PASS:-}
    volumes:
      - mcp-logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-3001}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      - juicebox-mosquitto

volumes:
  mosquitto-data:
  mosquitto-log:
  juicepassproxy-config:
  mcp-logs:
